# Production compose for VPS with existing nginx (no Caddy).
# App listens on 127.0.0.1:3003 — nginx proxies focus.etretyakov.ru → :3003
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      DATABASE_URL: postgresql://focus:${DB_PASSWORD}@db:5432/focus
      SESSION_SECRET: ${SESSION_SECRET}
      OWNER_PASSWORD_HASH: ${OWNER_PASSWORD_HASH}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: focus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: focus
    volumes:
      - focus_pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  focus_pg_prod:
